<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Aeroplan Award Checker{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        h1 { margin-top: 0; }
        a { color: #0a58ca; text-decoration: none; }
        a:hover { text-decoration: underline; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border-bottom: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        .disabled td { color: #888; }
        form.inline { display: inline; }
        button, .btn { font-size: 0.9rem; padding: 0.35rem 0.75rem; border: 1px solid #ccc;
                       background: #fafafa; border-radius: 4px; cursor: pointer; }
        button.primary, .btn.primary { background: #0a58ca; color: white; border-color: #0a58ca; }
        button.danger { background: #c52; color: white; border-color: #c52; }
        .flash { padding: 0.5rem 0.75rem; margin: 0.5rem 0; border-radius: 4px; }
        .flash.ok { background: #d1e7dd; color: #0f5132; }
        .flash.error { background: #f8d7da; color: #842029; }
        label { display: block; margin-top: 0.75rem; font-weight: 600; }
        input, select { width: 100%; padding: 0.4rem; font-size: 1rem;
                        border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 1rem; }
        .row > div { flex: 1; }
        .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <h1><a href="{{ url_for('index') }}">Aeroplan Award Checker</a></h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
